name: Unzip Project
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean up old files, then unzip fresh
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          echo "Found zip: $ZIP_FILE"

          # Alles außer .git, .github und der ZIP-Datei entfernen
          find . -mindepth 1 -maxdepth 1 \
            ! -name ".git" ! -name ".github" ! -name "$(basename "$ZIP_FILE")" \
            -exec rm -rf {} +

          mkdir -p /tmp/extracted
          unzip -q "$ZIP_FILE" -d /tmp/extracted
          PROJECT_DIR=$(find /tmp/extracted -maxdepth 4 -name "package.json" -exec dirname {} \; | head -n 1)
          echo "Project root found at: $PROJECT_DIR"

          shopt -s dotglob
          cp -r "$PROJECT_DIR"/* .
          rm -f "$(basename "$ZIP_FILE")"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Projekt sauber aus ZIP neu aufgebaut" || echo "Nothing to commit"
          git push
